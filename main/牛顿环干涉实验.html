    <style>
        /* ========== 星空背景样式（修复CSS语法错误） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background:

        @keyframes skyMove {
            0% { background-position: 0% 0%, 100% 0%, 50% 100%; }
            100% { background-position: 10% 20%, 90% 30%, 50% 80%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, #fff, transparent),
                radial-gradient(3px 3px at 120px 180px, #ddd, transparent),

            background-repeat: repeat;
            z-index: -1;
            animation: twinkle 8s infinite alternate, starsMove 20s infinite linear;
            opacity: 0.7;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(1px 1px at 80px 120px, #bbf, transparent),

    <div id="starParticles"></div>

    <div class="main-container">
        <h1 class="main-title">牛顿环干涉实验</h1>
        <div id="simulation" class="simulation-section">
            <h2 class="section-title">实验仿真</h2>
            <div class="simulation-layout">
                <div class="control-panel">
                    <h3>参数控制</h3>
                    <div class="control-group">
                        <label for="sliderR">1. 曲率半径 \(R\) (0.8–2.0 m)：</label>
                        <div class="slider-edit-group">
                            <div class="slider-container">
                                <input type="range" id="sliderR" min="0.8" max="2.0" step="0.001" value="1.2">
                            </div>
                            <div class="edit-container">
                                <input type="number" id="editR" value="1.2" min="0.8" max="2.0" step="0.001">

                        </div>
                    </div>
                    <div class="control-group">
                        <label for="sliderLambda">2. 入射光波长 \(\lambda\) (380–760 nm)：</label>
                        <div class="slider-edit-group">
                            <div class="slider-container">
                                <input type="range" id="sliderLambda" min="380" max="760" step="1" value="589">
                            </div>
                            <div class="edit-container">
                                <input type="number" id="editLambda" value="589" min="380" max="760" step="1">
                            </div>
                            <span class="unit-span">nm</span>
                        </div>
                    </div>
                    <div class="button-group">
                        <button id="resetParamsBtn" class="sim-button reset-btn">重置默认参数</button>
                    </div>
                </div>

                <div class="display-panel">
                    <div class="canvas-container">
                        <h3>二维牛顿环图样</h3>
                        <div class="chart-container">
                            <canvas id="ringCanvas" width="300" height="300" style="width:100%; height:auto; background:black;"></canvas>
                        </div>
                        <div class="current-params-below">
                            <h4>当前参数</h4>
                            <p id="currentParamsText">曲率半径: 1.200 m | 波长: 589 nm </p>
                        </div>
                    </div>
                </div>
            </div>

    <script>
        (function() {
            function createStarParticles() {
                const container = document.getElementById('starParticles');
                if (!container) return;
                const particleCount = 50;
                for (let i = 0; i < particleCount; i++) {
                    const star = document.createElement('div');
                    star.className = 'star-particle';
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.top = Math.random() * 100 + 'vh';
                    const size = (Math.random() * 3 + 1) + 'px';
                    star.style.width = size;
                    star.style.height = size;
                    const duration = Math.random()*10+10;
                    const delay = Math.random()*5;
                    const offset = Math.random()*100-50;
                    star.style.animation = `particleFloat_${i} ${duration}s ${delay}s infinite linear`;
                    
                    // 为每个粒子创建独立动画，修复CSS语法警告
                    const animStyle = document.createElement('style');
                    animStyle.textContent = `
                        @keyframes particleFloat_${i} {
                            0% { transform: translateY(0) translateX(0); opacity: 0; }
                            10% { opacity: 0.7; }
                            90% { opacity: 0.7; }
                            100% { transform: translateY(-100vh) translateX(${offset}px); opacity: 0; }
                        }
                    `;
                    document.head.appendChild(animStyle);
                    container.appendChild(star);
                }
            }
            document.addEventListener('DOMContentLoaded', function() {
                createStarParticles();
                MathJax.typeset();
            });
        })();
    </script>

    <script>
        (function(){
            const D = 0.005;
            const Rmax = D/2;
            const I0 = 1.0;
            const ATTEN_SCALE = 0.7;

            const ringCanvas = document.getElementById('ringCanvas');
            const ctxRing = ringCanvas.getContext('2d');
            const currentParamsText = document.getElementById('currentParamsText');

            const N = 300;
            const pixelStep = (2 * Rmax) / N;
            const halfN = N/2;
            
            let r2Map = new Array(N);
            for(let i=0; i<N; i++){
                r2Map[i] = new Array(N);
                const y = (i - halfN) * pixelStep;
                for(let j=0; j<N; j++){
                    const x = (j - halfN) * pixelStep;
                    r2Map[i][j] = x*x + y*y;
                }
            }
            
            let R = 1.2;
            let lambda = 589e-9;
            
            const Rslider = document.getElementById('sliderR');
            const editR = document.getElementById('editR');
            const lambdaSlider = document.getElementById('sliderLambda');
            const editLambda = document.getElementById('editLambda');
            const resetBtn = document.getElementById('resetParamsBtn');
            
            let autoInterval = null;
            let autoUpdating = false;
            let autoDirection = 1;
            const AUTO_STEP = 0.003;
            const AUTO_INTERVAL_MS = 30;
            
            function stopAutoDemo() {
                if (autoInterval) clearInterval(autoInterval);
                autoInterval = null;
                autoDirection = 1;
            }
            function startAutoDemo() {
                stopAutoDemo();
                const currentVal = parseFloat(Rslider.value);
                autoDirection = currentVal >= 2.0 ? -1 : (currentVal <= 0.8 ? 1 : autoDirection);
                autoInterval = setInterval(()=>{
                    if(autoUpdating) return;
                    autoUpdating = true;
                    let newVal = parseFloat(Rslider.value) + AUTO_STEP * autoDirection;
                    if(newVal >= 2.0){newVal=2.0;autoDirection=-1;}
                    if(newVal <= 0.8){newVal=0.8;autoDirection=1;}
                    Rslider.value = newVal.toFixed(4);
                    editR.value = newVal.toFixed(4);
                    Rslider.dispatchEvent(new Event('input',{bubbles:true}));
                    autoUpdating = false;
                },AUTO_INTERVAL_MS);
            }
            function wavelengthToRGB(wavelength_nm) {
                let w = Math.min(760, Math.max(380, wavelength_nm));
                let r=0,g=0,b=0;
                if(w>=380&&w<420){let t=(w-380)/40;r=0.4+0.6*t;g=0.2*(1-t);b=0.8+0.2*t;}
                else if(w>=420&&w<450){let t=(w-420)/30;r=0.2*(1-t);g=0.1*(1-t);b=0.9+0.1*t;}
                else if(w>=450&&w<495){let t=(w-450)/45;r=0;g=0.2*t;b=1;}
                else if(w>=495&&w<570){let t=(w-495)/75;r=0.2*t;g=1;b=1-t;}
                else if(w>=570&&w<590){let t=(w-570)/20;r=1;g=1;b=1-t;}
                else if(w>=590&&w<620){let t=(w-590)/30;r=1;g=1-0.5*t;b=0;}
                else if(w>=620&&w<=760){let t=(w-620)/140;r=1;g=0.4*(1-t);b=0;}
                r=Math.min(1,Math.max(0,r));g=Math.min(1,Math.max(0,g));b=Math.min(1,Math.max(0,b));
                return {r,g,b};
            }
            function intensityMonoColor(d,lambdaVal,intensity,r){
                let nm=lambdaVal*1e9;
                let rgb=wavelengthToRGB(nm);
                let atten=Math.exp(-Math.pow(r/(Rmax*ATTEN_SCALE),2));
                let factor=Math.min(1,Math.max(0,intensity*atten));
                return {r:Math.floor(rgb.r*factor*255),g:Math.floor(rgb.g*factor*255),b:Math.floor(rgb.b*factor*255)};
            }
            function intensityMono(d,lambdaVal){
                let phase=4*Math.PI*d/lambdaVal;
                return Math.min(1,Math.max(0,I0*(1-Math.cos(phase))));
            }
            function filmThickness(r,Rcurv){
                if(r>=Rcurv) return Rcurv;
                return Rcurv-Math.sqrt(Math.max(0,Rcurv*Rcurv-r*r));
            }
            function renderNewtonRings(){
                const width=ringCanvas.width;
                const height=ringCanvas.height;
                const imgData=ctxRing.createImageData(N,N);
                const data=imgData.data;
                let currentR=R;
                let currentLambda=lambda;
                let dCache=new Array(N),rCache=new Array(N);
                for(let i=0;i<N;i++){
                    dCache[i]=new Array(N);rCache[i]=new Array(N);
                    for(let j=0;j<N;j++){
                        let r2=r2Map[i][j];
                        let rVal=Math.sqrt(r2);
                        rCache[i][j]=rVal;
                        dCache[i][j]=filmThickness(rVal,currentR);
                    }
                }
                for(let i=0;i<N;i++){
                    for(let j=0;j<N;j++){
                        let dVal=dCache[i][j];
                        let rVal=rCache[i][j];
                        let I=intensityMono(dVal,currentLambda);
                        let col=intensityMonoColor(dVal,currentLambda,I,rVal);
                        let idx=(i*N+j)*4;
                        data[idx]=col.r;data[idx+1]=col.g;data[idx+2]=col.b;data[idx+3]=255;
                    }
                }
                const temp=document.createElement('canvas');
                temp.width=N;temp.height=N;
                temp.getContext('2d').putImageData(imgData,0,0);
                ctxRing.clearRect(0,0,width,height);
                ctxRing.drawImage(temp,0,0,width,height);

                // 十字坐标轴 + 日常标准直角箭头（物理实验规范样式）
                const centerX = width / 2;
                const centerY = height / 2;
                const axisLength = 280;
                const arrowSize = 8; // 标准箭头尺寸
                ctxRing.strokeStyle = '#ffffff';
                ctxRing.fillStyle = '#ffffff';
                ctxRing.lineWidth = 1;
                // 设置标签字体
                ctxRing.font = "bold 14px Arial";
                ctxRing.textAlign = "center";

                // X轴（水平向右）
                ctxRing.beginPath();
                ctxRing.moveTo(centerX - axisLength/2, centerY);
                ctxRing.lineTo(centerX + axisLength/2, centerY);
                ctxRing.stroke();
                // X轴标准箭头
                ctxRing.beginPath();
                ctxRing.moveTo(centerX + axisLength/2, centerY);
                ctxRing.lineTo(centerX + axisLength/2 - arrowSize, centerY - arrowSize/2);
                ctxRing.lineTo(centerX + axisLength/2 - arrowSize, centerY + arrowSize/2);
                ctxRing.closePath();
                ctxRing.fill();
                // X轴标签（调整后位置）
                ctxRing.fillText("x", centerX + axisLength/2 , centerY + 15);

                // Y轴（竖直向上）
                ctxRing.beginPath();
                ctxRing.moveTo(centerX, centerY + axisLength/2);
                ctxRing.lineTo(centerX, centerY - axisLength/2);
                ctxRing.stroke();
                // Y轴标准箭头
                ctxRing.beginPath();
                ctxRing.moveTo(centerX, centerY - axisLength/2);
                ctxRing.lineTo(centerX - arrowSize/2, centerY - axisLength/2 + arrowSize);
                ctxRing.lineTo(centerX + arrowSize/2, centerY - axisLength/2 + arrowSize);
                ctxRing.closePath();
                ctxRing.fill();
                // Y轴标签（调整后位置）
                ctxRing.fillText("y", centerX + 13, centerY - axisLength/2 + 8);
            }
            function updateAll(){
                renderNewtonRings();
                currentParamsText.textContent=`曲率半径: ${R.toFixed(3)} m | 波长: ${(lambda*1e9).toFixed(0)} nm`;
            }
            function onRChange(){
                if(!autoUpdating) stopAutoDemo();
                R=parseFloat(Rslider.value);editR.value=R.toFixed(3);updateAll();
            }
            function onLambdaChange(){
                let nm=parseFloat(lambdaSlider.value);lambda=nm*1e-9;editLambda.value=nm;updateAll();
            }
            function resetToDefault(){
                stopAutoDemo();
                Rslider.value=1.2;editR.value=1.2;
                lambdaSlider.value=589;editLambda.value=589;
                R=1.2;lambda=589e-9;updateAll();
            }
            function bindSliderEdit(slider,edit,cb){
                slider.addEventListener('input',()=>{edit.value=slider.value;cb();});
                edit.addEventListener('change',()=>{
                    let v=parseFloat(edit.value);
                    v=Math.max(parseFloat(slider.min),Math.min(parseFloat(slider.max),v));
                    slider.value=v;edit.value=v;cb();
                });
            }
            bindSliderEdit(Rslider,editR,onRChange);
            bindSliderEdit(lambdaSlider,editLambda,onLambdaChange);
            resetBtn.addEventListener('click',resetToDefault);
            document.getElementById('autoDemoBtn').addEventListener('click',startAutoDemo);
            document.getElementById('stopDemoBtn').addEventListener('click',stopAutoDemo);
            updateAll();
        })();
    </script>
</body>
</html>
